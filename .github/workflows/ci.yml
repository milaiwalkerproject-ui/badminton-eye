name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scoring-engine:
    name: ScoringEngine (swift test)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show toolchain
        run: swift --version

      # ScoringEngine is a pure-Swift package (no UIKit/SwiftUI/SwiftData),
      # so it builds and tests on the macOS host — fast and no simulator needed.
      - name: Run ScoringEngine tests
        working-directory: ScoringEngine
        run: swift test

  ios-app:
    name: iOS app build & test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show toolchain
        run: xcodebuild -version

      # Pick whatever iPhone simulator the runner actually has, rather than
      # hard-coding a device name that may not exist on a given image.
      - name: Pick an iOS simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; \
                          ids=[dev['udid'] for rt in d for dev in d[rt] \
                               if dev.get('isAvailable') and 'iPhone' in dev['name']]; \
                          print(ids[0] if ids else '')")
          if [ -z "$UDID" ]; then echo "No iPhone simulator available" >&2; exit 1; fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "Using simulator $UDID"

      - name: Build & test BadmintonEye
        run: |
          xcodebuild \
            -project BadmintonEye/BadmintonEye.xcodeproj \
            -scheme BadmintonEye \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -resultBundlePath TestResults.xcresult \
            clean test \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult
          path: TestResults.xcresult
          if-no-files-found: ignore
